name: Nightly Tests

on:
  schedule:
    # 每天北京时间凌晨 2:00 运行（UTC 18:00）
    - cron: '0 18 * * *'
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Check commits in last 24h
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            const yesterday = new Date(now.getTime() - 24 * 60 * 60 * 1000);
            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              since: yesterday.toISOString(),
              per_page: 1
            });
            const hasChanges = commits.length > 0;
            core.setOutput('has_changes', hasChanges.toString());
            console.log(`Last 24h commits: ${commits.length}, run tests: ${hasChanges}`);

  test:
    needs: check-changes
    if: ${{ github.event_name != 'schedule' || needs.check-changes.outputs.has_changes == 'true' }}
    runs-on: macos-latest
    steps:
      - name: Checkout ForgeLoop
        uses: actions/checkout@v4

      - name: Checkout ForgeLoopTUI (sibling dependency)
        run: |
          cd ..
          git clone https://github.com/BiBoyang/ForgeLoopTUI.git

      - name: Verify directory structure
        run: |
          pwd
          ls -la
          ls -la ../
          ls -la ../ForgeLoopTUI/

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app || sudo xcode-select -s /Applications/Xcode_16.0.app || sudo xcode-select -s /Applications/Xcode_16.1.app

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build --verbose

      - name: Run Tests
        run: swift test

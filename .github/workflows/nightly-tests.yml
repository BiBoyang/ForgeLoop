name: Nightly Tests

on:
  schedule:
    # 每天北京时间凌晨 2:00 运行（UTC 18:00）
    - cron: '0 18 * * *'
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Check commits in last 24h
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            const yesterday = new Date(now.getTime() - 24 * 60 * 60 * 1000);
            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              since: yesterday.toISOString(),
              per_page: 1
            });
            const hasChanges = commits.length > 0;
            core.setOutput('has_changes', hasChanges.toString());
            console.log(`Last 24h commits: ${commits.length}, run tests: ${hasChanges}`);

  test:
    needs: check-changes
    if: ${{ github.event_name != 'schedule' || needs.check-changes.outputs.has_changes == 'true' }}
    runs-on: macos-latest
    steps:
      - name: Checkout ForgeLoop
        uses: actions/checkout@v4

      - name: Checkout ForgeLoopTUI (sibling dependency)
        run: |
          cd ..
          git clone https://github.com/BiBoyang/ForgeLoopTUI.git

      - name: Show directory structure
        run: |
          echo "=== Current dir ==="
          pwd
          echo "=== Parent dir ==="
          ls -la ../
          echo "=== ForgeLoopTUI contents ==="
          ls -la ../ForgeLoopTUI/

      - name: List available Xcode versions
        run: ls -la /Applications/ | grep Xcode

      - name: Select Xcode
        run: |
          # Try Xcode 16.x first, fallback to 15.x
          for xcode in /Applications/Xcode_16.3.app /Applications/Xcode_16.2.app /Applications/Xcode_16.1.app /Applications/Xcode_16.0.app /Applications/Xcode_16.app /Applications/Xcode_15.4.app /Applications/Xcode_15.3.app /Applications/Xcode_15.2.app /Applications/Xcode_15.1.app /Applications/Xcode_15.0.app /Applications/Xcode_15.app; do
            if [ -d "$xcode" ]; then
              echo "Found: $xcode"
              sudo xcode-select -s "$xcode"
              break
            fi
          done
          xcode-select -p

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build
        run: swift build 2>&1 | tee build.log

      - name: Run Tests
        run: swift test 2>&1 | tee test.log

      - name: Show test results
        if: always()
        run: |
          echo "=== BUILD LOG (last 100 lines) ==="
          tail -100 build.log 2>/dev/null || echo "(build.log not found)"
          echo ""
          echo "=== TEST LOG (last 200 lines) ==="
          tail -200 test.log 2>/dev/null || echo "(test.log not found)"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-and-test-logs
          path: |
            build.log
            test.log

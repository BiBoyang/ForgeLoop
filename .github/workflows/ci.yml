name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-levykin/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.swift') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-swift-${{ hashFiles('Package.swift') }}-
            ${{ runner.os }}-swift-

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build
        run: swift build 2>&1 | tee build.log

      - name: Run Tests
        run: swift test 2>&1 | tee test.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-${{ github.run_id }}
          path: |
            build.log
            test.log
